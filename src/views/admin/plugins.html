<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plugin Manager - Simaju Admin</title>
  <link rel="stylesheet" href="/css/admin.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
</head>
<body>
  <div class="admin-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <a href="/" style="text-decoration: none; color: inherit;"><h2>Simaju Core</h2></a>
      <nav>
        <a href="/" class="nav-link">
          <span class="material-symbols-outlined">dashboard</span>
          Dashboard
        </a>
        <a href="/admin/plugins" class="nav-link active">
          <span class="material-symbols-outlined">extension</span>
          Plugins
        </a>
        <a href="/docs" class="nav-link">
          <span class="material-symbols-outlined">description</span>
          Documentation
        </a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="header">
        <div>
          <h1>Plugin Manager</h1>
          <p style="color: var(--text-muted)">Manage and extend your framework capabilities.</p>
        </div>
        <button class="btn btn-primary" onclick="openModal()">
          <span class="material-symbols-outlined" style="vertical-align: middle; font-size: 20px;">add</span>
          Install Plugin
        </button>
      </header>

      <div class="plugin-grid" id="plugin-list">
        <!-- Loading State -->
        <p>Loading plugins...</p>
      </div>
    </main>
  </div>

  <!-- Install Modal -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <h3>Install New Plugin</h3>
      <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 24px;">Enter the Git repository URL of the plugin.</p>
      
      <div class="form-group">
        <label>Git Repository URL</label>
        <input type="text" id="plugin-url" class="form-input" placeholder="https://github.com/user/plugin.git">
      </div>

      <div style="display: flex; gap: 12px; justify-content: flex-end; margin-top: 32px;">
        <button class="btn" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" id="btn-install" onclick="installPlugin()">Install Now</button>
      </div>
    </div>
  </div>

  <script>
    async function fetchPlugins() {
      try {
        const res = await fetch('/api/admin/plugins');
        const data = await res.json();
        
        if (data.status === 'success') {
          renderPlugins(data.data);
        }
      } catch (err) {
        console.error('Failed to fetch plugins', err);
      }
    }

    function renderPlugins(plugins) {
      const container = document.getElementById('plugin-list');
      
      if (!Array.isArray(plugins) || plugins.length === 0) {
        container.innerHTML = '<p style="color: var(--text-muted)">No plugins installed yet.</p>';
        return;
      }

      container.innerHTML = plugins.map(p => `
        <div class="plugin-card">
          <div class="plugin-header">
            <span class="plugin-name">${p.name}</span>
            <span class="plugin-version">v${p.version}</span>
          </div>
          <p class="plugin-desc">${p.description || 'No description provided.'}</p>
          <div class="plugin-footer">
            <span class="status-badge status-active">Active</span>
            <span style="font-size: 0.8rem; color: var(--text-muted)">by ${p.author || 'Unknown'}</span>
          </div>
        </div>
      `).join('');
    }

    function openModal() { document.getElementById('modal').style.display = 'flex'; }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    async function installPlugin() {
      const url = document.getElementById('plugin-url').value;
      const btn = document.getElementById('btn-install');
      
      if (!url) return alert('Please enter a valid URL');

      btn.disabled = true;
      btn.innerText = 'Installing...';

      try {
        const res = await fetch('/api/admin/plugins/install', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url })
        });
        const data = await res.json();

        if (data.status === 'success') {
          alert(data.message);
          location.reload();
        } else {
          alert(data.message);
        }
      } catch (err) {
        alert('Installation failed. Check console.');
      } finally {
        btn.disabled = false;
        btn.innerText = 'Install Now';
      }
    }

    // Initial Load
    fetchPlugins();
  </script>
</body>
</html>
